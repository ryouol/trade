syntax = "proto3";

package trade.risk;

import "marketdata.proto";

option go_package = "github.com/ryouol/trade/gen/go/risk";

enum TradingMode {
  MODE_UNSPECIFIED = 0;
  MODE_DISABLED = 1;
  MODE_PAPER = 2;
  MODE_SHADOW = 3;
  MODE_LIVE = 4;
}

// Current operational state of one (venue, market) pair.
message Position {
  trade.marketdata.Venue venue = 1;
  trade.marketdata.MarketRef market = 2;
  int64 net_qty_milli = 3;          // signed (+ long YES)
  int64 avg_entry_bps = 4;
  int64 realized_pnl_cents = 5;
  int64 unrealized_pnl_cents = 6;
  int64 last_update_ts_ms = 7;
}

message PnLSnapshot {
  int64 ts_ms = 1;
  int64 total_realized_cents = 2;
  int64 total_unrealized_cents = 3;
  int64 capital_cents = 4;
  map<string, int64> realized_by_strategy_cents = 5;
}

message ExposureSnapshot {
  int64 ts_ms = 1;
  map<string, int64> exposure_by_market_cents = 2;
  map<string, int64> exposure_by_source_cents = 3;  // by resolution_source
  int64 total_long_cents = 4;
  int64 total_short_cents = 5;
}

message VaRUpdate {
  int64 ts_ms = 1;
  int64 var_99_cents = 2;
  int64 var_95_cents = 3;
  int64 expected_shortfall_99_cents = 4;
  int32 monte_carlo_samples = 5;
  bool above_soft_cap = 6;
  bool above_hard_cap = 7;
}

enum KillSwitchReason {
  KS_UNSPECIFIED = 0;
  KS_MANUAL = 1;
  KS_HEARTBEAT_LOSS = 2;
  KS_CLICKHOUSE_LAG = 3;
  KS_RISK_ENGINE_CRASH = 4;
  KS_DRAWDOWN_BREACH = 5;
  KS_VAR_BREACH = 6;
  KS_UMA_DISPUTE = 7;
  KS_COMPLIANCE = 8;
}

message KillSwitchEvent {
  int64 ts_ms = 1;
  KillSwitchReason reason = 2;
  string actor = 3;            // "manual:user@…" or "auto:risk-engine"
  string detail = 4;
  repeated trade.marketdata.Venue affected_venues = 5;
}

// Real-time alerts emitted by the risk engine.
message RiskAlert {
  int64 ts_ms = 1;
  enum Severity {
    SEV_UNSPECIFIED = 0;
    SEV_INFO = 1;
    SEV_WARN = 2;
    SEV_ERROR = 3;
    SEV_CRITICAL = 4;
  }
  Severity severity = 2;
  string message = 3;
  string source = 4;           // e.g. "markout_check", "reconciler"
  string related_intent_id = 5;
  trade.marketdata.MarketRef related_market = 6;
}
