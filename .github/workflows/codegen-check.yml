name: codegen-check

on:
  pull_request:
    paths:
      - "packages/schemas/proto/**"
      - "packages/schemas/gen/**"
      - "tools/codegen/**"
      - ".github/workflows/codegen-check.yml"
  push:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Regenerate
        run: bash tools/codegen/codegen.sh

      - name: Fail if codegen produced changes not in the PR
        run: |
          if [[ -n "$(git status --porcelain packages/schemas/gen)" ]]; then
            echo "::error::Generated code is stale. Run 'make proto' locally and commit the results."
            git diff packages/schemas/gen
            exit 1
          fi
