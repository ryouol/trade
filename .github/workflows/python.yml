name: python

on:
  pull_request:
    paths:
      - "services/python/**"
      - "research/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/python.yml"
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Sync workspace
        run: uv sync --frozen || uv sync

      - name: Lint
        run: |
          uv run ruff check services/python research
          uv run ruff format --check services/python research

      - name: Type-check
        run: uv run mypy services/python research
        continue-on-error: true  # tighten once codebase types stabilize

      - name: Run tests
        run: uv run pytest -q services/python research

  build-cloudrun-images:
    runs-on: ubuntu-latest
    needs: lint-and-test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}
      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2
      - name: Build + push event-matcher
        run: |
          gcloud builds submit services/python/event-matcher \
            --tag=us-east4-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/trade/event-matcher:${{ github.sha }} \
            --gcs-source-staging-dir=gs://${{ secrets.GCP_BUILD_BUCKET }}/source
        if: hashFiles('services/python/event-matcher/Dockerfile') != ''
