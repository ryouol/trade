name: deploy-vm

on:
  workflow_dispatch:
    inputs:
      service:
        description: Service to deploy ("all" or one of {kalshi-connector, poly-us-connector, book-builder, risk-engine, ws-gateway})
        type: string
        default: all
      tag:
        description: Image tag (defaults to commit sha on main)
        type: string
        default: ""

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Auth to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Determine tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Copy compose + configs to the VM
        run: |
          gcloud compute scp --tunnel-through-iap \
            --zone="${{ secrets.GCP_ZONE }}" \
            --recurse \
            infra/docker-compose.vm.yml \
            infra/config \
            trade:/opt/trade/compose/

      - name: docker compose pull + up on the VM
        run: |
          gcloud compute ssh trade --tunnel-through-iap \
            --zone="${{ secrets.GCP_ZONE }}" \
            --command='cd /opt/trade/compose && \
              TAG=${{ steps.tag.outputs.tag }} \
              ARTIFACT_REGISTRY=us-east4-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/trade \
              docker compose -f docker-compose.vm.yml pull ${{ inputs.service == "all" && "" || inputs.service }} && \
              docker compose -f docker-compose.vm.yml up -d --remove-orphans ${{ inputs.service == "all" && "" || inputs.service }}'
