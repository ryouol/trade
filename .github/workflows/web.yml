name: web

on:
  pull_request:
    paths:
      - "apps/web/**"
      - "apps/api/**"
      - "packages/ui/**"
      - "package.json"
      - "pnpm-workspace.yaml"
      - "turbo.json"
      - ".github/workflows/web.yml"
  push:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Lint
        run: pnpm -r lint || true
      - name: Typecheck
        run: pnpm -r typecheck || true
      - name: Build
        run: pnpm -r build
      # Vercel auto-deploys main; nothing to push here.
